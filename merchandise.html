<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchandise — Courage In Common™</title>
  <meta name="description" content="Show your support with Courage in Common merchandise. Wear the ribbon. Support veterans.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #040a18;
      --bg-primary: #0a1628;
      --bg-surface: #0f1f3a;
      --bg-card: #111e35;
      --border: #1a2d4d;
      --border-gold: rgba(212, 175, 55, 0.25);
      --gold: #d4af37;
      --gold-bright: #e8c84a;
      --gold-dim: #b8960b;
      --text-primary: #f0f0f0;
      --text-muted: #c8d6e5;
      --text-dim: #5a6e8a;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body); font-weight: 400; color: var(--text-primary);
      background: var(--bg-deep); line-height: 1.8; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }
    a { color: var(--gold); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--gold-bright); }

    .overline {
      font-family: var(--font-body); font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 1rem; display: block;
    }
    .heading-section {
      font-family: var(--font-display); font-weight: 400;
      font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.2;
      color: var(--text-primary); letter-spacing: 0.02em;
    }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 1.5rem 0; transition: all var(--transition);
    }
    .navbar.scrolled {
      background: rgba(4, 10, 24, 0.95); backdrop-filter: blur(20px);
      padding: 1rem 0; border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-brand { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; color: var(--text-primary); letter-spacing: 0.05em; }
    .nav-brand span { color: var(--gold); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); transition: color var(--transition); position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--gold); transition: width var(--transition); }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      z-index: 10000;
      position: relative;
      background: none;
      border: none;
      padding: 10px;
    }
    .hamburger span {
      width: 24px;
      height: 1px;
      background: var(--text-primary);
      transition: all 0.4s ease;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    @media (max-width: 768px) {
      .nav-links {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2.5rem;
        z-index: 9999;
        padding: 0;
        margin: 0;
      }
      .nav-links.active { display: flex; }
      .nav-links a {
        font-size: 0.9rem;
        letter-spacing: 0.25em;
        font-family: var(--font-display);
        font-weight: 400;
      }
      .hamburger { display: flex; }
    }
